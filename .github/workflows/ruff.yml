name: CI

on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.13"

            - name: Install ruff
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install ruff

            - name: Run ruff
              run: ruff check --output-format=github .
